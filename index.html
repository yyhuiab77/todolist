<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>✨ My To-Do List ✨</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="todo-app" id="app" role="application" aria-labelledby="appTitle">
    <header class="app-header" id="header">
      <h1 id="appTitle">✨ My To-Do List ✨</h1>
    </header>

    <section class="input-area" id="inputArea" aria-label="Add task">
      <div class="row top-row">
        <label class="visually-hidden" for="taskInput">Task</label>
        <input type="text" id="taskInput" placeholder="What do you want to do?" autocomplete="off" inputmode="text" />

        <label class="visually-hidden" for="dateInput">Date</label>
        <input type="date" id="dateInput" />

        <label class="visually-hidden" for="priorityInput">Priority</label>
        <select id="priorityInput" title="Priority" aria-label="Priority">
          <option value="High" selected>High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>

      <div class="row bottom-row">
        <div class="category-wrap">
          <label class="visually-hidden" for="categoryInput">Category (type)</label>
          <input list="categoryList" type="text" id="categoryInput" placeholder="Type or pick category" autocomplete="off" aria-haspopup="listbox" aria-expanded="false" />
          <div id="categoryDropdown" class="category-dropdown hidden" role="listbox" aria-label="Saved categories"></div>
          <datalist id="categoryList"></datalist>
          <div id="pickedCategory" class="picked-category hidden" aria-hidden="true"></div>
        </div>

        <label class="visually-hidden" for="remarksInput">Remarks</label>
        <input type="text" id="remarksInput" placeholder="Remarks (optional)" autocomplete="off" inputmode="text" />

        <button id="addBtn" class="btn primary" aria-label="Add task">Add</button>
      </div>
    </section>

    <section class="controls" aria-label="Controls">
      <div class="left-controls">
        <div class="filters" role="tablist" aria-label="Filter tasks">
          <button id="filterAll" data-filter="all" class="filter" role="tab">All</button>
          <button id="filterActive" data-filter="active" class="filter active" role="tab">Active</button>
          <button id="filterCompleted" data-filter="completed" class="filter" role="tab">Completed</button>
        </div>
      </div>

      <div class="right-controls">
        <label class="visually-hidden" for="sortSelect">Sort</label>
        <select id="sortSelect" title="Sort tasks" aria-label="Sort tasks">
          <option value="created_desc">Newest</option>
          <option value="created_asc">Oldest</option>
          <option value="priority_desc">Priority High→Low</option>
          <option value="priority_asc">Priority Low→High</option>
          <option value="date_asc">Date Soon→Later</option>
          <option value="date_desc">Date Later→Soon</option>
          <option value="category_asc">Category A→Z</option>
          <option value="category_desc">Category Z→A</option>
        </select>
      </div>
    </section>

    <input type="text" id="searchInput" placeholder="Search tasks, categories, remarks..." aria-label="Search tasks" />

    <ul id="taskList" class="task-list" aria-live="polite"></ul>

    <footer class="footer">
      <span id="progress">Progress: 0 of 0 tasks</span>
      <div class="footer-actions">
        <button id="clearCompletedBtn" class="btn">Clear Completed</button>
        <button id="deleteAllBtn" class="btn danger">Delete All Tasks</button>
      </div>
    </footer>
  </main>

  <!-- Edit modal -->
  <div id="editModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="editTitle">
    <div class="modal-content">
      <h3 id="editTitle">Edit Task</h3>
      <input type="text" id="editText" placeholder="Task text" />
      <input type="date" id="editDate" />
      <select id="editPriority">
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <input type="text" id="editCategory" placeholder="Category" list="categoryList" />
      <input type="text" id="editRemarks" placeholder="Remarks" />
      <div class="modal-actions">
        <button id="saveEditBtn" class="btn primary">Save</button>
        <button id="cancelEditBtn" class="btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
